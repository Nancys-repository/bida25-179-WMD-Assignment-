<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Finder</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts (Awkward but Presentable) -->
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">

  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css">

  <style>
    .interest-question {
      font-family: 'Comic Neue', cursive;
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<header>
  <h1 class="sub-title">Finder</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="electives.html">Electives</a>
    <a href="finder.html">Finder</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="feedback.html">Feedback</a>
  </nav>
</header>

<!-- MAIN -->
<main class="container mt-4 text-center">

  <p class="finder-text">
    Choose the elective of your choice based on your interests 🎓
  </p>

  <!-- INTEREST INPUT -->
  <div id="interest-section" class="mb-4">
    <p class="interest-question">What are your interests?</p>
    <input type="text" id="userInterest" class="form-control mb-2" placeholder="Type your interests...">
    <button class="btn btn-warning" onclick="suggestFaculty()">Find Faculty</button>
  </div>

  <!-- Suggested Faculty -->
  <div id="suggestedFaculty" class="mb-4"></div>

  <!-- Finder Content -->
  <div id="content"></div>

</main>

<!-- FOOTER -->
<footer class="text-center mt-5 p-3 bg-dark text-white">
  <p>&copy; 2026 Elective Finder | All Rights Reserved</p>
</footer>


<script>

// DATA (Simplified example; you can expand)
const data = {
  public: {
    "University of Botswana": {
      "Faculty of Business": {
        "Accounting": "Study of financial reporting and auditing.",
        "Marketing": "Focuses on promoting and selling products.",
        "Management": "Learn to manage organizations effectively.",
        "Tourism and Hospitality": "Study hospitality management and tourism."
      },
      "Faculty of Science": {
        "Computer Science": "Study of programming and systems.",
        "Biology": "Study of living organisms.",
        "Chemistry": "Study of chemicals and reactions.",
        "Mathematics": "Study of numbers and logic."
      },
      "Faculty of Education": {
        "Primary Education": "Training to teach at primary level.",
        "Languages Education": "Study language teaching."
      }
    }
  },
  private: {
    "Botho University": {
      "Faculty of Computing": {
        "Software Engineering": "Design and development of software.",
        "Data Science": "Analysis of data for insights."
      },
      "Faculty of Business and Accounting": {
        "Accounting": "Financial management and reporting.",
        "Business Management": "Learning business operations."
      }
    }
  }
};

// FUNCTION: Suggest Faculty based on interest
function suggestFaculty() {
  const input = document.getElementById("userInterest").value.toLowerCase();
  let matches = [];

  for (let type in data) {
    for (let inst in data[type]) {
      for (let fac in data[type][inst]) {
        // Check if faculty name or courses include interest keywords
        if (fac.toLowerCase().includes(input)) {
          matches.push(`${fac} at ${inst} (${type} university)`);
        } else {
          for (let course in data[type][inst][fac]) {
            if (course.toLowerCase().includes(input)) {
              matches.push(`${fac} at ${inst} (${type} university)`);
            }
          }
        }
      }
    }
  }

  let display = document.getElementById("suggestedFaculty");
  if (matches.length > 0) {
    display.innerHTML = `
      <h5>Suggested Faculties:</h5>
      <ul class="list-group">
        ${matches.map(m => `<li class="list-group-item">${m}</li>`).join("")}
      </ul>
    `;
  } else {
    display.innerHTML = `<p class="text-danger">No matching faculties found. Try another interest.</p>`;
  }
}

// EXISTING FINDER BUTTONS (Keep previous functions)
function showButtons(items, nextLevel) {
  let content = document.getElementById("content");
  content.innerHTML = "";
  for (let key in items) {
    content.innerHTML += `<button class="btn btn-primary m-2" onclick='${nextLevel}("${key}")'>${key}</button>`;
  }
}

function showMain() {
  document.getElementById("content").innerHTML = `
    <button class="btn btn-success m-2" onclick="showPublic()">Public Universities</button>
    <button class="btn btn-dark m-2" onclick="showPrivate()">Private Institutions</button>
  `;
}

function showPublic() { showButtons(data.public, "showInstitutionPublic"); }
function showPrivate() { showButtons(data.private, "showInstitutionPrivate"); }

function showInstitutionPublic(name) { showButtons(data.public[name], "showFacultyPublic"); }
function showInstitutionPrivate(name) { showButtons(data.private[name], "showFacultyPrivate"); }

function showFacultyPublic(faculty) {
  let inst = Object.keys(data.public).find(i => data.public[i][faculty]);
  showButtons(data.public[inst][faculty], "showCoursePublic");
}
function showFacultyPrivate(faculty) {
  let inst = Object.keys(data.private).find(i => data.private[i][faculty]);
  showButtons(data.private[inst][faculty], "showCoursePrivate");
}

function showCoursePublic(course) {
  for (let inst in data.public) {
    for (let fac in data.public[inst]) {
      if (data.public[inst][fac][course]) {
        document.getElementById("content").innerHTML = `
          <h4>${course}</h4>
          <p>${data.public[inst][fac][course]}</p>
          <button class="btn btn-secondary mt-3" onclick="showMain()">Back</button>
        `;
      }
    }
  }
}

function showCoursePrivate(course) {
  for (let inst in data.private) {
    for (let fac in data.private[inst]) {
      if (data.private[inst][fac][course]) {
        document.getElementById("content").innerHTML = `
          <h4>${course}</h4>
          <p>${data.private[inst][fac][course]}</p>
          <button class="btn btn-secondary mt-3" onclick="showMain()">Back</button>
        `;
      }
    }
  }
}

// INITIAL LOAD
showMain();

</script>

</body>
</html>
